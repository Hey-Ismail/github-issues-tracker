<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <section id="login-page">
      <div class="grid mt-[85px] mb-[85px] place-items-center">
        <div
          class="w-fit sm:w-[520px] h-auto bg-[#ffffffFF] sm:bg-[#ffffffFF] p-8 rounded-xl shadow-[0_10px_30px_#00000014]"
        >
          <div class="github-info flex items-center flex-col">
            <img
              class="w-[100px] h-[100px] mb-6"
              src="./assets/github-logo.png"
              alt="github-logo"
            />
            <p class="text-[#1f2937FF] text-2xl font-semibold mb-1">
              GitHub Issues Tracker
            </p>
            <p class="text-[#64748bFF] mb-6">Sign in to manage your issues</p>
          </div>
          <div>
            <div class="flex items-center justify-center">
              <div class="w-full max-w-md p-8 rounded-xl">
                <!-- Username -->
                <label class="block text-gray-700 font-medium mb-2">
                  Username
                </label>
                <input
                  id="username"
                  type="text"
                  placeholder="Enter Username"
                  class="w-full px-4 py-2 mb-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                />
                <p class="text-sm text-purple-600 mb-4">Default: admin</p>

                <!-- Password -->
                <label class="block text-gray-700 font-medium mb-2">
                  Password
                </label>
                <input
                  id="password"
                  type="password"
                  placeholder="Enter Password"
                  class="w-full px-4 py-2 mb-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                />
                <p class="text-sm text-purple-600 mb-6">Default: admin123</p>

                <!-- Button -->
                <button
                  id="login-btn"
                  onclick="loginClick()"
                  class="w-full py-3 text-white font-semibold rounded-lg bg-gradient-to-r from-purple-700 to-indigo-600 hover:from-purple-800 hover:to-indigo-700 transition duration-200"
                >
                  Sign In
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section id="nav-bar" class="hidden">
      <nav
        class="bg-[#ffffffFF] py-3 sm:py-5 flex sm:justify-around sm:items-center flex-col sm:flex-row sm:w-full sm:m-0 m-2 shadow-[0_10px_30px_#00000014]"
      >
        <div
          class="flex sm:items-center gap-3 justify-center sm:flex-row items-center flex-col"
        >
          <img
            class="h-[40px] w-[40px]"
            src="./assets/github-logo.png"
            alt=""
          />
          <p class="text-2xl font-semibold mb-6 sm:mb-0">
            GitHub Issues Tracker
          </p>
        </div>

        <div class="flex items-center sm:gap-2 flex-col sm:flex-row gap-5">
          <label
            class="flex items-center gap-3 px-4 py-3 bg-white border border-gray-300 rounded-xl shadow-sm"
          >
            <!-- icon -->
            <svg
              class="w-5 h-5 text-gray-400"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-4.3-4.3"
              ></path>
            </svg>

            <!-- input -->
            <input
              id="input-search"
              type="search"
              placeholder="Search issues..."
              class="w-full border-0 bg-transparent text-gray-600 outline-none appearance-none placeholder-gray-400"
            />
          </label>
          <button
            id="search-btn"
            class="bg-[#4a00ffFF] rounded-lg hover:cursor-pointer"
          >
            <p class="px-4 py-3 text-base font-semibold text-white">Search</p>
          </button>
        </div>
      </nav>
      <!-- tab bar -->
      <div
        class="max-w-5xl mx-auto mt-[60px] bg-[#ffffffFF] p-6 rounded-lg shadow-lg flex flex-col gap-3 sm:flex-row sm:justify-between justify-center items-center"
      >
        <div class="flex flex-col sm:flex-row gap-3">
          <button
            id="all-btn"
            class="bg-[#4a00ffFF] w-[120px] h-[40px] rounded text-white hover:cursor-pointer"
          >
            All
          </button>
          <button
            id="open-btn"
            class="bg-white w-[120px] h-[40px] rounded text-black border border-[#e4e4e7FF] hover:bg-[#00a96eFF] hover:text-white hover:cursor-pointer"
          >
            Open
          </button>
          <button
            id="close-btn"
            class="bg-white w-[120px] h-[40px] rounded text-black border border-[#e4e4e7FF] hover:bg-[#a855f7FF] hover:text-white hover:cursor-pointer"
          >
            Close
          </button>
        </div>
      </div>
    </section>
    <section id="text-bar" class="hidden">
      <div class="mt-4 max-w-5xl mx-auto bg-[#ffffffFF] p-6 rounded-lg">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-2">
            <div class="w-[50px] bg-[#ece4ffFF] rounded-full">
              <img class="p-2" src="./assets/Aperture.png" alt="" />
            </div>
            <div>
              <p
                id="issue-count"
                class="text-[#1f2937FF] font-semibold text-xl"
              >
                50 Issues
              </p>
              <p class="text-[#64748bFF]">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <img src="./assets/Open-Status.png" alt="" />
            <p class="text-[#1f2937FF] font-medium">open</p>
            <img src="./assets/Closed- Status .png" alt="" />
            <p class="text-[#1f2937FF] font-medium">Closed</p>
          </div>
        </div>
      </div>
    </section>
    <!-- modal section -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div class="modal-action" id="issues-details-modal">
          <button class="btn">Close</button>
        </div>
      </div>
    </dialog>
    <section id="card-c" class="hidden">
      <div class="bg-[#FBFBFB] max-w-5xl mx-auto">
        <div
          class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 hidden"
          id="card-container"
        >
          <!-- GitHub issue cards will be dynamically inserted here -->
        </div>
      </div>
    </section>
    <!-- Loading bar -->
    <section id="loading">
      <div id="loading-bar" class="flex justify-center items-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
    </section>
    <script src="./src/script.js"></script>
  </body>
</html>
